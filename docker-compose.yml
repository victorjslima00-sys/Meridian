version: "3.8"

services:
  # Container 1: O Bot de Paper Trading (cron)
  bot:
    build: .
    container_name: meridian_bot
    restart: unless-stopped
    volumes:
      - ./data:/app/data      # Persiste o banco SQLite
      - ./logs:/app/logs      # Persiste os logs do Python
      - ./.env:/app/.env:ro   # Mapeia o .env como read-only
    env_file:
      - .env

  # Container 2: A API FastAPI (backend do dashboard)
  api:
    build: .
    container_name: meridian_api
    restart: unless-stopped
    command: uvicorn trading_bot.dashboard.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    depends_on:
      - bot

  # Container 3: O Frontend React (buildado e servido via nginx)
  frontend:
    image: node:20-alpine
    container_name: meridian_frontend
    working_dir: /app
    command: sh -c "npm install && npm run build && npx serve -s dist -l 3000"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    depends_on:
      - api

  # Container 4: Persistência L2 (Redis Cache)
  redis:
    image: redis:7-alpine
    container_name: meridian_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Container 5: Persistência Principal (TiDB - Compatível com MySQL)
  tidb:
    image: pingcap/tidb:v7.1.0
    container_name: meridian_tidb
    ports:
      - "4000:4000"
      - "10080:10080"
    restart: unless-stopped
    command: >
      --store=mocktikv
      --log-file=
    healthcheck:
      test: ["CMD", "mysql", "-h", "127.0.0.1", "-P", "4000", "-u", "root", "-e", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 10
