name: Deploy Meridian Bot to AWS

# Só roda depois que o workflow "CI" terminar com sucesso no branch main.
# Isso garante que código quebrado nunca chega ao servidor.
#
# Gate extra (secrets.SERVER_IP != ''): sem os secrets de deploy
# configurados no repositório, SSH_PRIVATE_KEY/SERVER_IP chegam vazios no
# job e o primeiro passo (ssh-keyscan) falha na hora — toda merge em main
# disparava uma tentativa de deploy fadada a falhar, virando ruído em vez
# de sinal. Com o gate, o job simplesmente não roda (skipped, não failed)
# até alguém configurar Settings → Secrets and variables → Actions:
# SSH_PRIVATE_KEY, SERVER_IP, TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID,
# EMERGENCY_PASSWORD, API_KEY, ALLOWED_ORIGINS (ver README.md).
# workflow_dispatch permite disparar manualmente depois de configurar,
# sem esperar o próximo push em main.
on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy:
    if: >-
      (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success')
      && secrets.SERVER_IP != ''
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup SSH Key
      run: |
        mkdir -p ~/.ssh/
        echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key.pem
        chmod 600 ~/.ssh/deploy_key.pem
        ssh-keyscan -H "$SERVER_IP" >> ~/.ssh/known_hosts
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        SERVER_IP: ${{ secrets.SERVER_IP }}

    - name: Copy files to AWS
      run: |
        rsync -avz --delete --exclude '.git' --exclude '.github' --exclude 'infra' --exclude '.env' --exclude '.agents' --exclude '.pytest_cache' --exclude '__pycache__' --exclude 'node_modules' --exclude 'data/*.db*' --exclude 'logs' -e "ssh -i ~/.ssh/deploy_key.pem" ./ ubuntu@$SERVER_IP:/app/Meridian/
      env:
        SERVER_IP: ${{ secrets.SERVER_IP }}

    - name: Inject Secrets & Restart Docker
      run: |
        ssh -i ~/.ssh/deploy_key.pem ubuntu@$SERVER_IP << 'EOF'
          cd /app/Meridian
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" > .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
          echo "EMERGENCY_PASSWORD=${{ secrets.EMERGENCY_PASSWORD }}" >> .env
          echo "API_KEY=${{ secrets.API_KEY }}" >> .env
          echo "ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}" >> .env
          sudo docker-compose down
          sudo docker-compose build
          sudo docker-compose up -d
        EOF
      env:
        SERVER_IP: ${{ secrets.SERVER_IP }}
