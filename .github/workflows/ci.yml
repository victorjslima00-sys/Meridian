name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov flake8 pytest-asyncio httpx

      - name: Lint (erros críticos — sintaxe e nomes indefinidos)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=.venv,__pycache__,frontend,infra,.agents

      - name: Lint (qualidade geral)
        run: |
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 \
            --statistics --exclude=.venv,__pycache__,frontend,infra,.agents

      - name: Rodar testes (trading_bot core + backend agents)
        env:
          PYTHONPATH: "."
          ANTHROPIC_API_KEY: "test-key-ci"
          GEMINI_API_KEY: "test-key-ci"
          TELEGRAM_BOT_TOKEN: "test-token-ci"
          TELEGRAM_CHAT_ID: "0"
          ALLOWED_ORIGINS: "http://localhost:3000"
        run: |
          pytest tests/ \
            --cov=trading_bot \
            --cov=backend \
            --cov-report=term-missing \
            --cov-report=xml \
            --asyncio-mode=auto \
            -v

      - name: Upload relatório de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: coverage.xml

